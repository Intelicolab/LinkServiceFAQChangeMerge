---
Debugger:
  DebugThreshold: error
  TestMode: '0'
Description: 'GenericInterfaceExtended: LinkObject, Service, SLA, FAQ agent, TicketMerge
  and ITSMChangeManagement operations for OTOBO Generic Interface.'
FrameworkVersion: 10.1.14
Provider:
  Operation:
    TicketMerge:
      Description: Merge two tickets into one (irreversible).
      MappingInbound:
        Type: Simple
      MappingOutbound:
        Type: Simple
      Type: Ticket::TicketMerge
    LinkList:
      Description: List links for a given object.
      MappingInbound:
        Type: Simple
      MappingOutbound:
        Type: Simple
      Type: LinkObject::LinkList
    LinkAdd:
      Description: Create a link between two objects.
      MappingInbound:
        Type: Simple
      MappingOutbound:
        Type: Simple
      Type: LinkObject::LinkAdd
    LinkDelete:
      Description: Delete a link between two objects.
      MappingInbound:
        Type: Simple
      MappingOutbound:
        Type: Simple
      Type: LinkObject::LinkDelete
    FAQSearch:
      Description: Search FAQ articles (agent-level, all states).
      MappingInbound:
        Type: Simple
      MappingOutbound:
        Type: Simple
      Type: FAQ::FAQSearch
    FAQGet:
      Description: Get a FAQ article by ID (agent-level, no state restriction).
      MappingInbound:
        Type: Simple
      MappingOutbound:
        Type: Simple
      Type: FAQ::FAQGet
    FAQAdd:
      Description: Create a FAQ article.
      MappingInbound:
        Type: Simple
      MappingOutbound:
        Type: Simple
      Type: FAQ::FAQAdd
    FAQUpdate:
      Description: Update a FAQ article.
      MappingInbound:
        Type: Simple
      MappingOutbound:
        Type: Simple
      Type: FAQ::FAQUpdate
    ServiceGet:
      Description: Get a service by ID.
      MappingInbound:
        Type: Simple
      MappingOutbound:
        Type: Simple
      Type: Service::ServiceGet
    ServiceList:
      Description: List all services.
      MappingInbound:
        Type: Simple
      MappingOutbound:
        Type: Simple
      Type: Service::ServiceList
    ServiceSearch:
      Description: Search services by name pattern.
      MappingInbound:
        Type: Simple
      MappingOutbound:
        Type: Simple
      Type: Service::ServiceSearch
    SLAGet:
      Description: Get an SLA by ID.
      MappingInbound:
        Type: Simple
      MappingOutbound:
        Type: Simple
      Type: SLA::SLAGet
    SLAList:
      Description: List all SLAs.
      MappingInbound:
        Type: Simple
      MappingOutbound:
        Type: Simple
      Type: SLA::SLAList
    ChangeGet:
      Description: Get a change by ID (ITSMChangeManagement).
      MappingInbound:
        Type: Simple
      MappingOutbound:
        Type: Simple
      Type: Change::ChangeGet
    ChangeList:
      Description: List all change IDs.
      MappingInbound:
        Type: Simple
      MappingOutbound:
        Type: Simple
      Type: Change::ChangeList
    ChangeSearch:
      Description: Search changes with filters.
      MappingInbound:
        Type: Simple
      MappingOutbound:
        Type: Simple
      Type: Change::ChangeSearch
    WorkOrderGet:
      Description: Get a work order by ID (ITSMChangeManagement).
      MappingInbound:
        Type: Simple
      MappingOutbound:
        Type: Simple
      Type: Change::WorkOrderGet
    WorkOrderList:
      Description: List work order IDs for a change.
      MappingInbound:
        Type: Simple
      MappingOutbound:
        Type: Simple
      Type: Change::WorkOrderList
    WorkOrderSearch:
      Description: Search work orders with filters.
      MappingInbound:
        Type: Simple
      MappingOutbound:
        Type: Simple
      Type: Change::WorkOrderSearch
    ConfigItemCreate:
      Description: Create a CMDB config item.
      MappingInbound:
        Type: Simple
      MappingOutbound:
        Type: Simple
      Type: ConfigItem::ConfigItemCreate
    ConfigItemUpdate:
      Description: Update a CMDB config item (creates new version).
      MappingInbound:
        Type: Simple
      MappingOutbound:
        Type: Simple
      Type: ConfigItem::ConfigItemUpdate
  Transport:
    Config:
      AdditionalHeaders: ~
      KeepAlive: ''
      MaxLength: '100000000'
      RouteOperationMapping:
        TicketMerge:
          RequestMethod:
            - POST
          Route: /TicketMerge
        LinkList:
          RequestMethod:
            - GET
            - POST
          Route: /LinkList
        LinkAdd:
          RequestMethod:
            - POST
          Route: /LinkAdd
        LinkDelete:
          RequestMethod:
            - POST
          Route: /LinkDelete
        FAQSearch:
          RequestMethod:
            - GET
            - POST
          Route: /FAQSearch
        FAQGet:
          RequestMethod:
            - GET
          Route: /FAQGet/:ItemID
        FAQAdd:
          RequestMethod:
            - POST
          Route: /FAQAdd
        FAQUpdate:
          RequestMethod:
            - POST
          Route: /FAQUpdate/:ItemID
        ServiceGet:
          RequestMethod:
            - GET
          Route: /ServiceGet/:ServiceID
        ServiceList:
          RequestMethod:
            - GET
          Route: /ServiceList
        ServiceSearch:
          RequestMethod:
            - GET
            - POST
          Route: /ServiceSearch
        SLAGet:
          RequestMethod:
            - GET
          Route: /SLAGet/:SLAID
        SLAList:
          RequestMethod:
            - GET
          Route: /SLAList
        ChangeGet:
          RequestMethod:
            - GET
          Route: /ChangeGet/:ChangeID
        ChangeList:
          RequestMethod:
            - GET
          Route: /ChangeList
        ChangeSearch:
          RequestMethod:
            - GET
            - POST
          Route: /ChangeSearch
        WorkOrderGet:
          RequestMethod:
            - GET
          Route: /WorkOrderGet/:WorkOrderID
        WorkOrderList:
          RequestMethod:
            - GET
          Route: /WorkOrderList/:ChangeID
        WorkOrderSearch:
          RequestMethod:
            - GET
            - POST
          Route: /WorkOrderSearch
        ConfigItemCreate:
          RequestMethod:
            - POST
          Route: /ConfigItemCreate
        ConfigItemUpdate:
          RequestMethod:
            - POST
          Route: /ConfigItemUpdate/:ConfigItemID
    Type: HTTP::REST
RemoteSystem: ''
Requester:
  Transport:
    Type: HTTP::REST
